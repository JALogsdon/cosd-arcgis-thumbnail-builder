<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Item Thumbnail Builder — City of San Diego GIS</title>
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./img/logo/favicon_32.png"
    />
    <!-- The item builder now lives at index.html. Forward here (keeping any
         query string and hash) so older shared viewer.html?... links still
         reproduce their saved settings. No <meta refresh> fallback: it can't
         carry the query string, so it would silently drop those settings. -->
    <script>
      location.replace("index.html" + location.search + location.hash);
    </script>
  </head>
  <body>
    <p>
      The item thumbnail builder has moved.
      <a href="index.html">Open the Item Thumbnail builder</a>. If this link
      carried saved settings, they require JavaScript to apply.
    </p>
  </body>
</html>
